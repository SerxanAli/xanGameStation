<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xan Game Platform</title>
    <style>
        /* --- Əsas Atmosfer --- */
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background-color: #050509;
            background-image: 
                radial-gradient(at 10% 10%, rgba(123, 22, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(0, 242, 255, 0.15) 0px, transparent 50%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 40px;
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 
                0 0 10px #00f2ff,
                0 0 20px #00f2ff,
                0 0 40px #7b16ff,
                0 0 80px #7b16ff;
            font-weight: 900;
        }

        .slider-container {
            position: relative;
            width: 90%;
            max-width: 1400px;
            margin-top: 50px;
            display: flex;
            align-items: center;
        }

        .cards-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 25px;
            padding: 30px;
            -ms-overflow-style: none;  
            scrollbar-width: none; 
        }

        .cards-wrapper::-webkit-scrollbar {
            display: none;
        }

        .card {
            min-width: 280px;
            height: 400px;
            background: #10101a;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s ease-out;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background-size: cover;
            background-position: center;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #00f2ff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
        }

        .card {
    position: relative;
    overflow: hidden; /* Emoji kənara çıxmasın */
    cursor: pointer;
}

.zombie-emoji {
    position: absolute;
    top: 30%; /* Kartın yuxarı hissəsində yerləşməsi üçün */
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px; /* Emojinin böyüklüyü */
    z-index: 2;
    transition: all 0.3s ease;
    filter: drop-shadow(0 0 10px #00f2ff); /* Neon effekti */
    animation: zombieFloat 3s ease-in-out infinite;
}

/* Mouse ilə kartın üzərinə gələndə emoji böyüsün */
.card:hover .zombie-emoji {
    font-size: 80px;
    filter: drop-shadow(0 0 20px #ff0000); /* Üzərinə gələndə qırmızı neon */
}

/* Zombi hərəkət animasiyası */
@keyframes zombieFloat {
    0%, 100% {
        transform: translate(-50%, -50%) rotate(-50deg);
    }
    50% {
        transform: translate(-50%, -60%) rotate(5deg);
    }
}

        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        .card h2 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            color: #fff;
        }

        .card p {
            margin: 0;
            font-size: 0.9rem;
            color: #00f2ff;
            font-weight: bold;
            text-transform: uppercase;
        }

        .nav-btn {
            background: rgba(123, 22, 255, 0.2);
            border: 2px solid #7b16ff;
            color: #fff;
            font-size: 2rem;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background: #7b16ff;
            box-shadow: 0 0 15px #7b16ff;
        }

        .prev { left: -30px; }
        .next { right: -30px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <h1>Xan Game</h1>

    <div class="slider-container">
        <button class="nav-btn prev" onclick="scrollSlider(-1)">&#10094;</button>
        
        <div class="cards-wrapper" id="cardsWrapper">
            
           <div class="card" style="background-image: url('https://via.placeholder.com/300x400/10101a/00f2ff?text=TPS+Mutant+Land');" onclick="openGame('https://serxanali.github.io/TPSmutantLand/')">
    <div class="card-overlay"></div>
    
    <div class="zombie-emoji">🧟‍♂️</div>

    <div class="card-content">
        <p>Zombi Land</p>
        <h2>Döyüş Ruhu</h2>
    </div>
</div>

            <div class="card" style="background-image: url('https://via.placeholder.com/300x400/10101a/7b16ff?text=Oyun+2');" onclick="openGame('https://serxanali.github.io/Chess2D/')">
                <div class="card-overlay"></div>
                <div class="card-content">
                    <p>Chess</p>
                    <h2>SAHMAT</h2>
                </div>
            </div>

            <div class="card" style="background-image: url('https://via.placeholder.com/300x400/10101a/00f2ff?text=Oyun+3');" onclick="openGame('#')">
                <div class="card-overlay"></div>
                <div class="card-content">
                    <p>Yarış</p>
                    <h2>Sürət Həddi</h2>
                </div>
            </div>

            <div class="card" style="background-image: url('https://via.placeholder.com/300x400/10101a/7b16ff?text=Oyun+4');" onclick="openGame('InGame/tetris.html')">
                <div class="card-overlay"></div>
                <div class="card-content">
                    <p>Tetris</p>
                    <h2>Şəhər Qur</h2>
                </div>
            </div>
        </div>

        <button class="nav-btn next" onclick="scrollSlider(1)">&#10095;</button>
    </div>

    <script>
        function scrollSlider(direction) {
            const wrapper = document.getElementById('cardsWrapper');
            const scrollAmount = 350; 
            wrapper.scrollBy({
                left: direction * scrollAmount,
                behavior: 'smooth'
            });
        }

        // Karta klik edəndə işləyən funksiya
        function openGame(url) {
            if(url !== '#') {
                window.location.href = url; // Linki eyni pəncərədə açır
            } else {
                console.log("Bu oyun üçün link hələ təyin edilməyib.");
            }
        }
    </script>
</body>
</html>
